apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: neogenesis-vault-pki
spec:
  vault:
    server: https://vault.example.com
    path: pki/sign/neogenesis-grpc
    caBundle: <BASE64_VAULT_CA_BUNDLE>
    auth:
      appRole:
        path: approle
        roleId: <VAULT_APPROLE_ROLE_ID>
        secretRef:
          name: vault-approle
          key: secretId
