version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: neogenesis-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - neogenesis_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: neogenesis-backend
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      DB_POOL_SIZE: ${DB_POOL_SIZE}
      APP_VERSION: ${APP_VERSION}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_SECRET: ${JWT_SECRET}
      PAIRING_SECRET: ${PAIRING_SECRET}
      HTTP_PORT: ${HTTP_PORT}
      GRPC_PORT: ${GRPC_PORT}
      GRPC_ENABLED: ${GRPC_ENABLED}
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
      - "${GRPC_PORT}:${GRPC_PORT}"
    depends_on:
      - postgres

volumes:
  neogenesis_pgdata:
